name: Daily README Date Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history so we can see remote branches

      - name: Update README with today's date
        run: |
          TODAY=$(date +"%m/%d/%Y")
          echo "$TODAY" > README.md

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch, commit, and push
        id: push
        if: steps.changes.outputs.changed == 'true'
        run: |
          TODAY=$(date +"%m/%d/%Y")
          BRANCH="auto-update/readme-date-$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete the remote branch if it already exists
          if git ls-remote --exit-code origin "refs/heads/$BRANCH" > /dev/null 2>&1; then
            echo "Branch $BRANCH already exists on remote. Deleting it."
            git push origin --delete "$BRANCH"
          fi

          git checkout -b "$BRANCH"
          git add README.md
          git commit -m "Update README with today's date: $TODAY"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        id: create_pr
        if: steps.changes.outputs.changed == 'true'
        run: |
          # Only create a PR if one doesn't already exist for this branch
          EXISTING_PR=$(gh pr list --head "${{ steps.push.outputs.branch }}" --json number --jq '.[0].number')
          if [ -z "$EXISTING_PR" ]; then
            PR_URL=$(gh pr create \
              --title "Update README date to ${{ steps.push.outputs.today }}" \
              --body "Automated daily update of the README with today's date: **${{ steps.push.outputs.today }}**" \
              --head "${{ steps.push.outputs.branch }}" \
              --base main)
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          else
            echo "PR #$EXISTING_PR already exists for this branch. Skipping creation."
            PR_NUMBER=$EXISTING_PR
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge Pull Request
        if: steps.changes.outputs.changed == 'true' && steps.create_pr.outputs.pr_number != ''
        run: |
          # Wait briefly for the PR to be fully available
          sleep 5
          gh pr merge ${{ steps.create_pr.outputs.pr_number }} --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
